<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Halaman Tidak Ditemukan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:linear-gradient(
        135deg,
        #0f766e 0%,
        #16a34a 50%,
        #65d64f 100%
    );
}

.container{
    width:100%;
    max-width:500px;
    text-align:center;
}

img{
    width:100%;
    max-width:420px;
    display:block;
    margin:auto;
    filter:drop-shadow(0 18px 35px rgba(0,0,0,.25));
    animation:float 3s ease-in-out infinite;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;

    background:#ffffff;
    color:#15803d;

    text-decoration:none;
    font-size:18px;
    font-weight:700;

    border-radius:50px;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(0,0,0,.2);
}

</style>
</head>

<body>

<div class="container">

    <img src="404.png" alt="404 Error">

    <a href="/" class="btn">
        🏠 Kembali ke Beranda
    </a>

</div>

</body>
</html>
